# Phase 0 image_pool 字段可省（无图）。

jobs:
  - job_id: "demo-2026-05-27-001"
    pdf: "inputs/pdfs/sample.pdf"
    template: "academic_review"        # 对应 inputs/style_templates/academic_review.yaml
    product: "sample_product"          # 对应 inputs/products/sample_product.yaml
    title_hint: "讨论基因治疗递送系统的工程化挑战（可改）"   # 可选


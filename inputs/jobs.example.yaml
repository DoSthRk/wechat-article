# 任务清单 —— 复制为 jobs.yaml（去掉 .example）后实际跑
#
# 每个 job = 一篇文章：
#   line     ：内容线 id（aav / solidex），决定写作侧重 prompts/lines/{line}.md
#   pdf      ：核心素材 PDF（事实地基；图也只从 PDF 抽）
#   template ：风格模板 inputs/style_templates/{id}.yaml
#   product  ：固定产品 inputs/products/{id}.yaml —— 方案 B：正文纯科普，结尾一句点名它（人工选品）
#   title_hint：可选，给个起标题方向（标题里不要出现产品名）

jobs:
  - job_id: "aav-demo-001"
    line: "aav"
    pdf: "inputs/pdfs/aav-sample.pdf"
    template: "aav_academic_soft_intro"        # inputs/style_templates/aav_academic_soft_intro.yaml
    product: "purprox_aaveasy_spin_columns"    # inputs/products/purprox_aaveasy_spin_columns.yaml
    image_pool: "aav_sample"                   # 配图来自 PDF（Phase 1 用）
    title_hint: "从论文的机制发现切入，解读 AAV 工艺启示（可改）"

  - job_id: "solidex-demo-001"
    line: "solidex"
    pdf: "inputs/pdfs/solidex-sample.pdf"
    template: "oncology_wechat_pop_sci"        # inputs/style_templates/oncology_wechat_pop_sci.yaml
    product: "solidex_pan_t_cell_iso_kit"      # inputs/products/solidex_pan_t_cell_iso_kit.yaml
    image_pool: "solidex_sample"
    title_hint: "从复发/难治淋巴瘤的治疗困境切入，解读双抗机制（可改）"
